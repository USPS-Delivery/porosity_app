<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ne Analysis Pro</title>
    
    <link rel="manifest" href="data:application/manifest+json,{'name':'Ne Analysis Pro','short_name':'NeCalc','display':'standalone','start_url':'/porosity_app/','background_color':'#f0f4f8','theme_color':'#2b6cb0','icons':[{'src':'https://cdn-icons-png.flaticon.com/512/1086/1086741.png','sizes':'512x512','type':'image/png'}]}">
    <meta name="theme-color" content="#2b6cb0">
    <meta name="mobile-web-app-capable" content="yes">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: #f0f4f8; color: #333; padding: 15px; margin: 0; }
        .container { max-width: 800px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { color: #1a365d; font-size: 1.4rem; border-bottom: 2px solid #cbd5e0; padding-bottom: 10px; margin: 0 0 20px 0; }
        .grid-layout { display: grid; grid-template-columns: 1fr; gap: 15px; margin-bottom: 20px; }
        @media (min-width: 600px) { .grid-layout { grid-template-columns: 1fr 1fr; } }
        .card { background: #f8fafc; padding: 15px; border-radius: 10px; border: 1px solid #e2e8f0; }
        label { display: block; margin: 8px 0 4px; font-weight: 600; font-size: 0.85rem; color: #4a5568; }
        input, select { width: 100%; padding: 12px; border: 1px solid #cbd5e0; border-radius: 8px; font-size: 16px; margin-bottom: 10px; background: white; }
        button { background-color: #2b6cb0; color: white; border: none; padding: 14px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1rem; transition: background 0.2s; }
        button:active { background-color: #2c5282; }
        .btn-success { background-color: #38a169; margin-top: 10px; }
        .stats-box { background: #ebf8ff; padding: 15px; border-left: 4px solid #3182ce; border-radius: 4px; margin-top: 15px; display: none; font-size: 0.9rem; }
        .chart-container { margin-top: 20px; height: 300px; display: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.85rem; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        th { background: #2d3748; color: white; }
        tr:nth-child(even) { background-color: #f8fafc; }
    </style>
</head>
<body>

<div class="container">
    <h2>Effective Porosity (Ne) Tool</h2>
    
    <div class="grid-layout">
        <div class="card">
            <label>Flow Rate (Q) Units</label>
            <select id="unitQ">
                <option value="1">m³/day</option>
                <option value="5.45099">Gallons/min (GPM)</option>
                <option value="86.4">Liters/sec</option>
                <option value="24">m³/hour</option>
            </select>
            
            <label>Drawdown (s) Units</label>
            <select id="unitS">
                <option value="1">Meters</option>
                <option value="0.3048">Feet</option>
            </select>

            <label>Manual Entry (Q)</label>
            <input type="number" id="manualQ" placeholder="Enter Flow Rate" inputmode="decimal">
            <label>Manual Entry (s)</label>
            <input type="number" id="manualS" placeholder="Enter Drawdown" inputmode="decimal">
            <button onclick="addManual()">Calculate & Save</button>
        </div>

        <div class="card">
            <label>Bulk CSV Upload</label>
            <input type="file" id="csvInput" accept=".csv">
            <button class="btn-success" onclick="processBulk()">Process File</button>
            
            <div id="statsArea" class="stats-box">
                <div id="statsContent"></div>
            </div>
        </div>
    </div>

    <div id="chartArea" class="chart-container">
        <canvas id="neChart"></canvas>
    </div>

    <div class="card">
        <div style="overflow-x:auto;">
            <table id="resultsTable">
                <thead>
                    <tr>
                        <th>Q (m3/d)</th>
                        <th>s (m)</th>
                        <th>Ne Result</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
        <button style="margin-top:15px; background-color: #4a5568;" onclick="downloadCSV()">Export Results</button>
    </div>
</div>

<script>
    let dataset = [];
    let myChart = null;

    function calculateNe(q, s) {
        const nQ = q * parseFloat(document.getElementById('unitQ').value);
        const nS = s * parseFloat(document.getElementById('unitS').value);
        if (nS <= 0 || isNaN(nQ) || isNaN(nS)) return null;
        const ratio = nQ / nS;
        const ne = 0.15108 * Math.pow(ratio, 0.0826);
        return { q: nQ.toFixed(2), s: nS.toFixed(2), ratio: ratio.toFixed(4), ne: ne.toFixed(6) };
    }

    function addManual() {
        const q = parseFloat(document.getElementById('manualQ').value);
        const s = parseFloat(document.getElementById('manualS').value);
        const result = calculateNe(q, s);
        if (result) { dataset.push(result); updateUI(true); }
        else { alert("Please enter valid positive numbers."); }
    }

    function processBulk() {
        const file = document.getElementById('csvInput').files[0];
        if (!file) return alert("Select a file.");
        const reader = new FileReader();
        reader.onload = function(e) {
            const lines = e.target.result.split('\n').filter(l => l.trim().length > 0);
            const headers = lines[0].toLowerCase().split(',');
            const qIdx = headers.indexOf('q');
            const sIdx = headers.indexOf('s');
            if (qIdx === -1 || sIdx === -1) return alert("CSV must have 'q' and 's' columns.");
            for (let i = 1; i < lines.length; i++) {
                const cols = lines[i].split(',');
                const result = calculateNe(parseFloat(cols[qIdx]), parseFloat(cols[sIdx]));
                if (result) dataset.push(result);
            }
            updateUI(true);
        };
        reader.readAsText(file);
    }

    function updateUI(showAnalysis = false) {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        dataset.forEach(row => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${row.q}</td><td>${row.s}</td><td><strong>${row.ne}</strong></td>`;
            tbody.prepend(tr);
        });
        if (dataset.length > 0) {
            document.getElementById('statsArea').style.display = 'block';
            runStats();
        }
        if (dataset.length > 1) {
            document.getElementById('chartArea').style.display = 'block';
            renderChart();
        }
    }

    function runStats() {
        const nes = dataset.map(d => parseFloat(d.ne));
        const mean = nes.reduce((a, b) => a + b) / nes.length;
        document.getElementById('statsContent').innerHTML = `<strong>Mean Ne:</strong> ${mean.toFixed(6)}<br><strong>Total Samples:</strong> ${nes.length}`;
    }

    function renderChart() {
        const ctx = document.getElementById('neChart').getContext('2d');
        const sorted = [...dataset].sort((a, b) => a.ratio - b.ratio);
        if (myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: sorted.map(d => d.ratio),
                datasets: [{ label: 'Ne vs Specific Capacity', data: sorted.map(d => d.ne), borderColor: '#2b6cb0', backgroundColor: 'rgba(43,108,176,0.1)', fill: true, tension: 0.3 }]
            },
            options: { responsive: true, maintainAspectRatio: false, scales: { x: { title: { display: true, text: 'Q/s Ratio' } }, y: { title: { display: true, text: 'Ne' } } } }
        });
    }

    function downloadCSV() {
        if (dataset.length === 0) return;
        let csv = "Q(m3/d),s(m),Ne\n";
        dataset.forEach(d => csv += `${d.q},${d.s},${d.ne}\n`);
        const blob = new Blob([csv], { type: 'text/csv' });
        const a = document.createElement('a');
        a.href = window.URL.createObjectURL(blob);
        a.download = 'Ne_Analysis_Results.csv';
        a.click();
    }
</script>
</body>
</html>
